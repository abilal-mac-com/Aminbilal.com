<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amin's Personal Site</title>
<meta name="description" content="Amin Bilal — a bit of this and a bit of that.">

<!--
  ============================================================
  aminbilal.com — personal landing page (index.html)
  ------------------------------------------------------------
  Sits at the site root alongside:
    · technology.html   (the Executive Technology Literacy site)
    · /documents/       (the typeset PDFs used by technology.html)

  The Technology button links out to technology.html.
  The five remaining sections open an "under preparation" page,
  addressed by URL hash (#physics, #markets, #pakistan,
  #diabetes, #placeholder) and served from this same file.
  To give one a real page later, its label maps to a title in
  the SUBJECTS object in the script at the foot of the file.
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#F9F8F3; --ink:#1A1A1A; --oxblood:#861831; --oxblood-deep:#6C1327;
    --grey:#5A5A5A; --soft:#4A4843; --rule:#D8D5CC; --rule-strong:#C7C3B8;
    --serif:'Lora', Georgia, 'Times New Roman', serif;
    --hand:'Caveat', 'Segoe Script', 'Bradley Hand', cursive;
    --sans:'Liberation Sans', Arial, Helvetica, sans-serif;
  }
  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0; background:var(--cream); color:var(--ink);
    font-family:var(--serif); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  a{ color:var(--oxblood); text-decoration:none; }
  [hidden]{ display:none !important; }
  a:focus-visible{ outline:2px solid var(--oxblood); outline-offset:4px; }

  /* -------------------- landing -------------------- */
  .hero{
    min-height:100vh; min-height:100svh;
    display:flex; align-items:center; justify-content:center;
    padding:clamp(40px,8vw,90px) clamp(20px,5vw,56px);
    text-align:center;
  }
  .hero-inner{ width:100%; max-width:760px; }

  .site-title{
    font-family:var(--serif); font-weight:700; color:var(--ink);
    font-size:clamp(40px,8.6vw,78px); line-height:1.03; letter-spacing:-.02em; margin:0;
  }
  .tagline{
    font-family:var(--hand); color:var(--oxblood); font-weight:600;
    font-size:clamp(31px,7.4vw,54px); line-height:1; margin:.28em 0 0;
  }

  .tiles{
    display:flex; flex-wrap:wrap; justify-content:center; gap:16px;
    max-width:690px; margin:clamp(40px,6vw,64px) auto 0;
  }
  .tile{
    flex:1 1 185px; max-width:216px; min-height:94px;
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:18px 20px;
    font-family:var(--serif); font-weight:600; font-size:21px; color:var(--oxblood);
    background:#FFFFFF; border:1px solid rgba(134,24,49,.35); border-radius:5px;
    transition:background .18s ease, color .18s ease, border-color .18s ease, transform .18s ease;
  }
  .tile:hover, .tile:focus-visible{
    background:var(--oxblood); color:#fff; border-color:var(--oxblood); transform:translateY(-2px);
  }

  .foot{
    margin-top:clamp(34px,6vw,54px);
    font-family:var(--sans); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--grey);
  }

  /* -------------------- subject (under preparation) -------------------- */
  #subject{ min-height:100vh; min-height:100svh; display:flex; flex-direction:column; }
  .subject-top{ padding:clamp(20px,5vw,40px) clamp(20px,5vw,56px) 0; }
  .back{
    font-family:var(--sans); font-weight:700; text-transform:uppercase; letter-spacing:.14em;
    font-size:12px; color:var(--oxblood); display:inline-flex; align-items:center; gap:9px;
  }
  .back:hover{ color:var(--oxblood-deep); }
  .subject-center{
    flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:clamp(30px,8vw,64px) clamp(20px,5vw,56px);
  }
  .subject-title{
    font-family:var(--serif); font-weight:700; color:var(--ink);
    font-size:clamp(42px,9vw,74px); line-height:1.02; letter-spacing:-.015em; margin:0;
  }
  .subject-status{
    font-family:var(--hand); color:var(--oxblood); font-weight:600;
    font-size:clamp(29px,6.2vw,44px); margin:.28em 0 0;
  }
  .subject-note{
    font-family:var(--serif); font-style:italic; color:var(--grey);
    font-size:clamp(16px,2.4vw,19px); line-height:1.5; margin:1.1em 0 0; max-width:44ch;
  }

  @media (prefers-reduced-motion:reduce){ *{ transition-duration:.001ms !important; } }
</style>
</head>

<body>

<!-- ===================== LANDING ===================== -->
<div id="landing">
  <main class="hero">
    <div class="hero-inner">
      <h1 class="site-title">Amin&rsquo;s Personal Site</h1>
      <p class="tagline">A bit of this and a bit of that</p>

      <nav class="tiles" aria-label="Sections">
        <a class="tile" href="technology.html">Technology</a>
        <a class="tile" href="#physics">Physics</a>
        <a class="tile" href="#markets">Markets</a>
        <a class="tile" href="#pakistan">Pakistan</a>
        <a class="tile" href="#diabetes">Diabetes</a>
        <a class="tile" href="#placeholder">Placeholder</a>
      </nav>

      <p class="foot">Amin Bilal</p>
    </div>
  </main>
</div>

<!-- ===================== SUBJECT (under preparation) ===================== -->
<div id="subject" hidden>
  <div class="subject-top">
    <a class="back" href="#"><span aria-hidden="true">&larr;</span>&nbsp; Amin&rsquo;s Personal Site</a>
  </div>
  <div class="subject-center">
    <h1 class="subject-title" aria-live="polite"></h1>
    <p class="subject-status">Under preparation</p>
    <p class="subject-note">This section is being written and will appear here in due course.</p>
  </div>
</div>

<script>
(function(){
  "use strict";
  var SUBJECTS = {
    physics:'Physics', markets:'Markets', pakistan:'Pakistan',
    diabetes:'Diabetes', placeholder:'Placeholder'
  };
  var landing = document.getElementById('landing');
  var subject = document.getElementById('subject');
  var title   = subject.querySelector('.subject-title');

  function route(){
    var key = (location.hash || '').replace(/^#/,'').toLowerCase();
    if(Object.prototype.hasOwnProperty.call(SUBJECTS, key)){
      title.textContent = SUBJECTS[key];
      document.title = SUBJECTS[key] + " — Amin's Personal Site";
      landing.hidden = true;
      subject.hidden = false;
    } else {
      subject.hidden = true;
      landing.hidden = false;
      document.title = "Amin's Personal Site";
    }
    window.scrollTo(0, 0);
  }

  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
