<!--
  ============================================================
  aminbilal.com — personal landing page (index.html)
  ------------------------------------------------------------
  Photographic edition. A full-bleed image sits behind the whole
  field; the six sections are set, unboxed and lowercase, in a
  single horizontal row across the top; the wordmark and
  handwritten tagline hold the centre.

  Sits at the site root alongside:
    · technology.html   (the Executive Technology Literacy site)
    · physics.html      (The Particle Physics Primer)
    · markets.html      (What Makes Markets Tick)
    · /documents/       (the typeset PDFs used by technology.html)

  The Technology, Physics and Markets links open their own pages.
  Pakistan, Diabetes and Placeholder open an "under preparation"
  panel addressed by URL hash (#pakistan, #diabetes, #placeholder),
  served from this same file. To give one a real page later, point
  its link at the new file and remove its entry from the SUBJECTS
  object in the script at the foot of the file.

  Layout: the landing is a flex column — the row of sections at
  the top, the masthead centred in the space beneath, the name at
  the foot — so the row may wrap to two lines on a phone without
  ever colliding with the title. On a wide screen the six sit on
  one line across the top; on an iPhone they settle into two
  centred rows.

  The hero photograph is embedded as a Base64 data-URI in the
  .bg rule below, so this page is a single self-contained file
  with nothing external to upload. The background is painted on a
  fixed, full-viewport layer (not background-attachment:fixed,
  which misbehaves on iOS); a feathered "veil" over it darkens
  only the top edge (for the row), the very centre (to seat the
  title) and the base (for the footer), leaving the mid-field and
  edges of the image bright. All text is warm white/cream with a
  soft shadow. The entrance rise/fade is disabled under
  prefers-reduced-motion.
  ============================================================
-->

<script>
(function(){
  "use strict";
  var SUBJECTS = {
    pakistan:'Pakistan',
    diabetes:'Diabetes', placeholder:'Placeholder'
  };
  var landing = document.getElementById('landing');
  var subject = document.getElementById('subject');
  var title   = subject.querySelector('.subject-title');

  function route(){
    var key = (location.hash || '').replace(/^#/,'').toLowerCase();
    if(Object.prototype.hasOwnProperty.call(SUBJECTS, key)){
      title.textContent = SUBJECTS[key];
      document.title = SUBJECTS[key] + " — Amin's Personal Site";
      landing.hidden = true;
      subject.hidden = false;
    } else {
      subject.hidden = true;
      landing.hidden = false;
      document.title = "Amin's Personal Site";
    }
    window.scrollTo(0, 0);
  }

  window.addEventListener('hashchange', route);
  route();
})();
</script>
